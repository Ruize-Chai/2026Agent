<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <!-- Rounded font for the brand title -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&family=Sacramento&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top function bar -->
    <header class="welcome-topbar">
        <span class="welcome-topbar-title">Oriflow Agent</span>
    </header>
    <!-- Main layout shell -->
    <main class="welcome-shell">
        <!-- Window row -->
        <section class="welcome-panels">
            <div class="welcome-panel welcome-panel-info">
                <h1 class="welcome-title">Oriflow Agent</h1>
                <p class="welcome-tagline">下一代工作流构建解决方案。</p>
                <p class="welcome-description">
                    通过实时交互式Agent元工作流实现Workflow构建,实现准确性和智能性的完美平衡.
                </p>
                <p class="welcome-slogan">Every Flow from Oriflow</p>
            </div>
            <div class="welcome-panel welcome-panel-actions">
                <a class="welcome-action" href="/register">Register</a>
                <a class="welcome-action" href="/login">Login</a>
                <a class="welcome-action" href="https://github.com/Ruize-Chai/Oriflow-Agent" target="_blank" rel="noreferrer">Visit Our Github</a>
            </div>
        </section>
    </main>
</body>

<style>
    /* Theme tokens */
    :root {
        --bg-light: #3c424a;
        --bg-mid: #22272e;
        --bg-dark: #0f1216;
        --glass: rgba(255, 255, 255, 0.18);
    }

    /* Page background and layout */
    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-light), var(--bg-mid), var(--bg-dark));
        color: #1e1f24;
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
        font-family: "Nunito", "Segoe UI", "PingFang SC", sans-serif;
        padding-top: 84px;
        box-sizing: border-box;
    }

    /* Main container */
    .welcome-shell {
        width: min(80vw, 860px);
        min-height: 60vh;
        display: grid;
        justify-items: center;
        z-index: 1;
    }

    /* White top bar */
    .welcome-topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
        z-index: 2;
        display: flex;
        align-items: center;
        padding: 0 32px;
        box-sizing: border-box;
    }

    .welcome-topbar-title {
        font-size: 20px;
        letter-spacing: 0.5px;
        color: #15181d;
    }

    /* Panel row */
    .welcome-panels {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 380px));
        gap: 56px;
        justify-content: center;
    }

    /* Square windows */
    .welcome-panel {
        aspect-ratio: 1 / 1;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .welcome-panel-info {
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 36px;
        box-sizing: border-box;
        gap: 16px;
    }

    .welcome-title {
        margin: 0;
        font-size: 28px;
        color: #16191f;
    }

    .welcome-description {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: #4e5662;
    }

    .welcome-tagline {
        margin: 0;
        font-size: 24px;
        color: #2b3139;
        font-family: -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    .welcome-slogan {
        margin: auto 0 0;
        font-size: 40px;
        color: #b9bfc8;
        font-family: "Sacramento", "Bradley Hand", "Segoe Script", cursive;
        font-style: italic;
    }

    .welcome-panel-actions {
        flex-direction: column;
        gap: 18px;
        padding: 28px;
        box-sizing: border-box;
    }

    .welcome-action {
        width: min(90%, 260px);
        height: 44px;
        border-radius: 5px;
        border: none;
        background: #0c0c0f;
        color: #ffffff;
        font-size: 15px;
        letter-spacing: 0.4px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.18s ease, background 0.18s ease;
    }

    .welcome-action:hover {
        background: #11131a;
        transform: scale(1.05);
    }

    /* Frosted background effects 毛玻璃效果*/
    body::before {
        content: "";
        position: fixed;
        inset: -10% 0 0 -10%;
        background: radial-gradient(40% 35% at 50% 45%, rgba(255, 255, 255, 0.22), transparent 60%),
            radial-gradient(60% 50% at 20% 20%, rgba(255, 255, 255, 0.28), transparent 60%),
            radial-gradient(50% 40% at 80% 10%, rgba(255, 255, 255, 0.18), transparent 65%),
            radial-gradient(55% 45% at 70% 80%, rgba(255, 255, 255, 0.12), transparent 70%);
        filter: blur(18px);
        opacity: 0.8;
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: var(--glass);
        backdrop-filter: blur(14px) saturate(120%);
        -webkit-backdrop-filter: blur(14px) saturate(120%);
        pointer-events: none;
        z-index: 0;
    }

    @media (max-width: 720px) {
        .welcome-shell {
            width: min(90vw, 520px);
        }

        .welcome-topbar {
            height: 56px;
        }

        .welcome-panels {
            grid-template-columns: 1fr;
        }

        .welcome-panel {
            width: min(80vw, 320px);
            justify-self: center;
        }
    }
</style>
</html>
